name: CI Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies (root)
      run: npm install

    - name: Install and Build Server
      run: |
        cd server
        npm install
        npx prisma generate
        npx tsc --noEmit

    - name: Install and Build Client
      run: |
        cd client
        npm install
        npm run build
